<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conceptualsea - Something creative is building. Fueling creativity, building trust, and driving success. Let's take your brand to new heights.">
    
    <!-- Title Tag -->
    <title>Conceptualsea | Something Creative is Building</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="favicon.png?v=4">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@500;600;700;800&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Layered Vector Wave Background (Representing the "sea") -->
    <div class="wave-container" id="wave-bg">
        <svg viewBox="0 0 1440 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Layer 1: Indigo Wave -->
            <path d="M0,160 C320,320,640,0,960,160 C1120,240,1280,240,1440,160 L1440,320 L0,320 Z" fill="rgba(35, 28, 106, 0.15)"></path>
            <!-- Layer 2: Teal Wave -->
            <path d="M0,224 C320,128,640,288,960,192 C1120,144,1280,256,1440,224 L1440,320 L0,320 Z" fill="rgba(13, 148, 136, 0.04)"></path>
            <!-- Layer 3: Green Wave -->
            <path d="M0,288 C320,256,640,320,960,256 C1120,224,1280,288,1440,256 L1440,320 L0,320 Z" fill="rgba(16, 185, 129, 0.02)"></path>
        </svg>
    </div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Header Section -->
        <header class="header animate-fade-in" id="main-header">
            <div class="logo">
                <img src="logo.png?v=4" alt="Conceptualsea Logo" class="logo-img">
            </div>
            <div class="header-right">
                <a href="mailto:milan@conceptualsea.com" class="contact-btn">Contact Us</a>
            </div>
        </header>

        <!-- Hero / Content Area -->
        <main class="main-content" id="main-hero">
            <div class="hero-layout">
                <h1 class="hero-title animate-slide-up" style="animation-delay: 0.1s;" id="hero-heading">
                    Something <span class="gradient-text">Creative</span> <br>is Building.
                </h1>
                
                <p class="hero-subtitle animate-slide-up" style="animation-delay: 0.2s;" id="hero-subtext">
                    Fueling creativity, building trust, and driving success. We are working hard to take your brand to new heights. Stay tuned!
                </p>

                <!-- Clean Typographic Services Index -->
                <div class="services-index animate-slide-up" style="animation-delay: 0.3s;">
                    <span>BRAND IDENTITY</span>
                    <span class="separator">//</span>
                    <span>DIGITAL MARKETING</span>
                    <span class="separator">//</span>
                    <span>CREATIVE EXPERIENCE</span>
                </div>
            </div>
        </main>

        <!-- Footer Area -->
        <footer class="footer animate-fade-in" style="animation-delay: 0.4s;" id="main-footer">
            
            <div class="footer-center">
                <div class="social-group">
                    <!-- Facebook -->
                    <a href="https://www.facebook.com/share/1BZPyU2kJ4/?mibextid=wwXIfr" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Facebook" id="fb-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                    </a>
                    <!-- Instagram -->
                    <a href="https://www.instagram.com/conceptualseaa" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="Instagram" id="ig-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                    </a>
                    <!-- TikTok -->
                    <a href="https://tiktok.com/@conceptualseatok" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="TikTok" id="tiktok-link">

                    </a>
                    <!-- X / Twitter -->
                    <a href="https://x.com/conceptualsea" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="X (Twitter)" id="x-link">

                    <a href="https://www.linkedin.com/company/conceptualsea" target="_blank" rel="noopener noreferrer" class="social-link" aria-label="LinkedIn" id="li-link">

                    </a>
                </div>
            </div>
            
            <div class="footer-right">
                <p class="copyright-text">&copy; 2026 Conceptualsea. All rights reserved.</p>
            </div>
        </footer>
    </div>
</body>
</html>
