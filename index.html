<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Conceptualsea - Something creative is building. Fueling creativity, building trust, and driving success. Let's take your brand to new heights.">
    
    <!-- Title Tag -->
    <title>Conceptualsea | Something Creative is Building</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Ambient Animated Background Visuals -->
    <div class="bg-grid" id="bg-grid"></div>
    <div class="blob-wrapper">
        <div class="blob blob-indigo" id="blob-indigo"></div>
        <div class="blob blob-teal" id="blob-teal"></div>
        <div class="blob blob-green" id="blob-green"></div>
    </div>

    <!-- Main App Container -->
    <div class="app-container">
        <!-- Header Section -->
        <header class="header animate-fade-in" id="main-header">
            <div class="logo">
                <svg class="logo-icon" width="40" height="40" viewBox="20 20 60 60" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <!-- Shadow filter for the 3D overlap effect -->
                        <filter id="logo-shadow" x="-20%" y="-20%" width="140%" height="140%">
                            <feDropShadow dx="-0.8" dy="1.2" stdDeviation="1" flood-color="#03040b" flood-opacity="0.6"/>
                        </filter>
                    </defs>
                    <!-- Conceptualsea Logo: Sleek overlapping geometric chevron arrows -->
                    <!-- Green Chevron (Left Half) -->
                    <path d="M 63 40 L 28 49 L 49 60 Z" fill="#3df28d" />
                    <!-- Green Chevron (Right Half) -->
                    <path d="M 63 40 L 49 60 L 54 75 Z" fill="#10b981" />
                    <!-- Teal Chevron (Top) with shadow -->
                    <path d="M 72 28 L 37 37 L 58 48 L 63 63 Z" fill="#0d9488" filter="url(#logo-shadow)" />
                </svg>
                <span class="logo-brand">Conceptualsea</span>
            </div>
        </header>

        <!-- Hero / Content Area -->
        <main class="main-content" id="main-hero">
            <div class="hero-card">
                <!-- Status Badge -->
                <div class="badge animate-slide-up" style="animation-delay: 0.1s;" id="badge-launch">
                    <span class="badge-indicator"></span>
                    <span class="badge-text">Launching Summer 2026</span>
                </div>
                
                <!-- Main Heading -->
                <h1 class="hero-title animate-slide-up" style="animation-delay: 0.2s;" id="hero-heading">
                    Something <span class="gradient-text">Creative</span> <br>is Building.
                </h1>
                
                <!-- Subheading -->
                <p class="hero-subtitle animate-slide-up" style="animation-delay: 0.3s;" id="hero-subtext">
                    Fueling creativity, building trust, and driving success! We are working hard to take your brand to new heights. Stay tuned!
                </p>

                <!-- Interactive Subscription form -->
                <div class="subscription-container animate-slide-up" style="animation-delay: 0.4s;">
                    <form class="subscription-form" id="subscribe-form" novalidate>
                        <div class="input-wrapper">
                            <span class="input-prefix-icon">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                            </span>
                            <input type="email" id="email" class="email-input" placeholder="Enter your email address" required autocomplete="off" aria-label="Email address for updates">
                            <button type="submit" id="submit-btn" class="submit-button" aria-label="Notify me on launch">
                                <span>Notify Me</span>
                                <svg class="arrow-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
                            </button>
                        </div>
                    </form>
                    
                    <!-- Notification Messages -->
                    <div id="notification" class="notification-box" role="alert"></div>
                </div>
            </div>
        </main>

        <!-- Footer Area -->
        <footer class="footer animate-fade-in" style="animation-delay: 0.5s;" id="main-footer">
            <div class="footer-left">
                <a href="mailto:hello@conceptualsea.com" class="contact-link" id="email-link">
                    <svg class="contact-icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></svg>
                    <span>hello@conceptualsea.com</span>
                </a>
            </div>
            
            <div class="footer-center">
                <div class="social-group">
                    <!-- Facebook -->
                    <a href="#" class="social-link" aria-label="Facebook" id="fb-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></svg>
                    </a>
                    <!-- LinkedIn -->
                    <a href="#" class="social-link" aria-label="LinkedIn" id="li-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-2-2 2 2 0 0 0-2 2v7h-4v-7a6 6 0 0 1 6-6z"/><rect width="4" height="12" x="2" y="9"/><circle cx="4" cy="4" r="2"/></svg>
                    </a>
                    <!-- Instagram -->
                    <a href="#" class="social-link" aria-label="Instagram" id="ig-link">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></svg>
                    </a>
                </div>
            </div>
            
            <div class="footer-right">
                <p class="copyright-text">&copy; 2026 Conceptualsea. All rights reserved.</p>
            </div>
        </footer>
    </div>

    <!-- Client-Side Subscription Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('subscribe-form');
            const emailInput = document.getElementById('email');
            const submitBtn = document.getElementById('submit-btn');
            const notification = document.getElementById('notification');

            form.addEventListener('submit', (event) => {
                event.preventDefault();
                
                const emailValue = emailInput.value.trim();
                
                // Clear any existing notification state
                notification.className = 'notification-box';
                notification.textContent = '';
                notification.style.display = 'none';
                
                // Email format validator regex
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                
                if (!emailValue) {
                    showNotification('Please enter your email address to register.', 'error');
                    return;
                }
                
                if (!emailRegex.test(emailValue)) {
                    showNotification('Please enter a valid email address (e.g. name@domain.com).', 'error');
                    return;
                }
                
                // Set CTA button to submitting state
                submitBtn.disabled = true;
                submitBtn.classList.add('submitting');
                const buttonSpan = submitBtn.querySelector('span');
                const originalText = buttonSpan.textContent;
                buttonSpan.textContent = 'Registering...';
                
                // Mock network request (1.2 seconds)
                setTimeout(() => {
                    submitBtn.disabled = false;
                    submitBtn.classList.remove('submitting');
                    buttonSpan.textContent = originalText;
                    
                    showNotification(`Thank you! We will notify you at ${emailValue} when we launch.`, 'success');
                    form.reset();
                }, 1200);
            });
            
            function showNotification(message, type) {
                notification.textContent = message;
                notification.classList.add(type);
                notification.style.display = 'block';
                
                // Force a layout reflow to restart CSS animations
                notification.style.animation = 'none';
                notification.offsetHeight;
                notification.style.animation = null;
                
                notification.classList.add('show');
            }
        });
    </script>
</body>
</html>
